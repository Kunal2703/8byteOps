name: Scheduled Security Scan

# ── Triggers ──────────────────────────────────────────────────────────────────
on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday at 06:00 UTC
  workflow_dispatch:        # Allow manual trigger

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: '283800772211'
  ECR_REPOSITORY: devops-demo-app
  NODE_VERSION: '20'

jobs:
  # ── Dependency Audit ──────────────────────────────────────────────────────────
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Full npm audit
        working-directory: app
        run: |
          npm audit --json > npm-audit-full.json || true
          npm audit

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: weekly-npm-audit
          path: app/npm-audit-full.json
          retention-days: 30

  # ── Container Scan (latest ECR image) ────────────────────────────────────────
  container-scan:
    name: Container Scan (ECR latest)
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/github-actions-deploy-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Pull latest image from ECR
        run: |
          docker pull ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:latest

      - name: Run Trivy full scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:latest
          format: 'sarif'
          output: 'trivy-weekly.sarif'
          severity: 'MEDIUM,HIGH,CRITICAL'
          exit-code: '0'

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-weekly.sarif'

      - name: Trivy table output
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:latest
          format: 'table'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'

  # ── Terraform Security Scan ───────────────────────────────────────────────────
  terraform-scan:
    name: Terraform Security Scan (tfsec)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform
          soft_fail: true

  # ── Notify on findings ────────────────────────────────────────────────────────
  notify:
    name: Notify Security Summary
    runs-on: ubuntu-latest
    needs: [dependency-audit, container-scan, terraform-scan]
    if: always()

    steps:
      - name: Send weekly security summary to Slack
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "🔒 Weekly Security Scan Complete",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*🔒 Weekly Security Scan — ${{ github.repository }}*\n\n| Check | Status |\n|---|---|\n| Dependency Audit | ${{ needs.dependency-audit.result }} |\n| Container Scan | ${{ needs.container-scan.result }} |\n| Terraform Scan | ${{ needs.terraform-scan.result }} |\n\n<${{ github.server_url }}/${{ github.repository }}/security/code-scanning|View Security Alerts>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
        continue-on-error: true
