name: Deploy to Production

# ── Triggers ──────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'k8s/**'
      - 'terraform/**'

  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (default: git SHA)'
        required: false
        default: ''
      skip_tests:
        description: 'Skip tests (emergency deploy only)'
        type: boolean
        default: false

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: '283800772211'
  ECR_REPOSITORY: devops-demo-app
  EKS_CLUSTER: devops-demo-production
  K8S_NAMESPACE: production
  NODE_VERSION: '20'

jobs:
  # ── Job 1: Run Tests ──────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_tests }}

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: tododb_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Run lint
        working-directory: app
        run: npm run lint

      - name: Run tests
        working-directory: app
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: tododb_test
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_SSL: 'false'
        run: npm test -- --forceExit

  # ── Job 2: Build & Push to ECR ───────────────────────────────────────────────
  build-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: [test]
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_uri: ${{ steps.meta.outputs.image_uri }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set image tag
        id: meta
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            TAG="${{ inputs.image_tag }}"
          else
            TAG="${{ github.sha }}"
          fi
          SHORT_SHA="${TAG:0:7}"
          ECR_URI="${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}"
          echo "image_tag=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "image_uri=${ECR_URI}:${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "ecr_uri=${ECR_URI}" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: |
            ${{ steps.meta.outputs.image_uri }}
            ${{ steps.meta.outputs.ecr_uri }}:latest
          build-args: IMAGE_TAG=${{ steps.meta.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta.outputs.image_uri }}
          format: 'table'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'
        continue-on-error: true

  # ── Job 3: Manual Approval Gate ──────────────────────────────────────────────
  approval:
    name: Manual Approval — Production Deploy
    runs-on: ubuntu-latest
    needs: [build-push]
    environment:
      name: production
      url: http://k8s-producti-devopsde-57ff8a31b1-358644725.us-east-1.elb.amazonaws.com

    steps:
      - name: Approval granted
        run: echo "✅ Approved by ${{ github.actor }} — deploying ${{ needs.build-push.outputs.image_tag }}"

  # ── Job 4: Deploy to EKS ─────────────────────────────────────────────────────
  deploy:
    name: Deploy to EKS Production
    runs-on: ubuntu-latest
    needs: [build-push, approval]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.EKS_CLUSTER }} \
            --region ${{ env.AWS_REGION }}

      - name: Deploy to EKS
        env:
          IMAGE_TAG: ${{ needs.build-push.outputs.image_tag }}
          ECR_URI: ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}
        run: |
          kubectl apply --validate=false -f k8s/namespace.yaml
          kubectl apply --validate=false -f k8s/serviceaccount.yaml
          kubectl apply --validate=false -f k8s/external-secret.yaml
          sleep 15
          kubectl delete job db-migrate -n ${{ env.K8S_NAMESPACE }} --ignore-not-found=true
          sed "s#:latest#:${IMAGE_TAG}#g" k8s/db-migrate-job.yaml | kubectl apply --validate=false -f -
          kubectl wait job/db-migrate -n ${{ env.K8S_NAMESPACE }} --for=condition=complete --timeout=180s
          sed "s#:latest#:${IMAGE_TAG}#g" k8s/deployment.yaml | kubectl apply --validate=false -f -
          kubectl apply --validate=false -f k8s/service.yaml
          kubectl apply --validate=false -f k8s/ingress.yaml
          kubectl apply --validate=false -f k8s/hpa.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/devops-demo \
            -n ${{ env.K8S_NAMESPACE }} --timeout=300s

  # ── Job 5: Auto Rollback ──────────────────────────────────────────────────────
  rollback:
    name: Auto Rollback on Failure
    runs-on: ubuntu-latest
    needs: [deploy]
    if: failure()

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Rollback
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}
          kubectl rollout undo deployment/devops-demo -n ${{ env.K8S_NAMESPACE }}
          kubectl rollout status deployment/devops-demo -n ${{ env.K8S_NAMESPACE }} --timeout=120s
          echo "✅ Rollback complete"
