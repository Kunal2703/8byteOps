name: PR Checks

# ── Triggers ──────────────────────────────────────────────────────────────────
on:
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
      - 'k8s/**'
      - '.github/workflows/**'

# Cancel in-progress runs for the same PR
concurrency:
  group: pr-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ── Job 1: Unit & Integration Tests ─────────────────────────────────────────
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: tododb_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Run ESLint
        working-directory: app
        run: npm run lint
        continue-on-error: false

      - name: Run unit tests
        working-directory: app
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: tododb_test
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_SSL: 'false'
        run: npm test -- --coverage --forceExit

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: app/coverage/
          retention-days: 7

  # ── Job 2: Dependency Vulnerability Scan ────────────────────────────────────
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: npm audit (HIGH + CRITICAL only)
        working-directory: app
        run: npm audit --audit-level=high
        continue-on-error: true   # Report but don't block on existing vulns

      - name: npm audit report (JSON)
        working-directory: app
        run: npm audit --json > npm-audit.json || true

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: app/npm-audit.json
          retention-days: 7

  # ── Job 3: Docker Build + Trivy Container Scan ───────────────────────────────
  container-scan:
    name: Docker Build & Container Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: false
          tags: devops-demo-app:pr-${{ github.event.pull_request.number }}
          build-args: IMAGE_TAG=pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: devops-demo-app:pr-${{ github.event.pull_request.number }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'   # Don't fail on findings — report only on PR

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Trivy summary (table format)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: devops-demo-app:pr-${{ github.event.pull_request.number }}
          format: 'table'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'

  # ── Job 4: Terraform Validate ────────────────────────────────────────────────
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.5.7'

      - name: Terraform Format Check
        working-directory: terraform/production
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init (local backend for validation)
        working-directory: terraform/production
        run: |
          terraform init -backend=false
        env:
          TF_VAR_db_password: 'dummy-for-validation'
          TF_VAR_bastion_key_name: 'dummy-key'
          TF_VAR_alert_email: 'test@example.com'

      - name: Terraform Validate
        working-directory: terraform/production
        run: terraform validate
        env:
          TF_VAR_db_password: 'dummy-for-validation'
          TF_VAR_bastion_key_name: 'dummy-key'
          TF_VAR_alert_email: 'test@example.com'

  # ── Job 5: PR Summary Comment ────────────────────────────────────────────────
  pr-summary:
    name: PR Summary
    runs-on: ubuntu-latest
    needs: [test, dependency-scan, container-scan, terraform-validate]
    if: always()

    steps:
      - name: Post PR summary comment
        uses: actions/github-script@v7
        with:
          script: |
            const jobs = {
              'Unit Tests':         '${{ needs.test.result }}',
              'Dependency Scan':    '${{ needs.dependency-scan.result }}',
              'Container Scan':     '${{ needs.container-scan.result }}',
              'Terraform Validate': '${{ needs.terraform-validate.result }}',
            };

            const icon = (r) => r === 'success' ? '✅' : r === 'skipped' ? '⏭️' : '❌';
            const rows = Object.entries(jobs)
              .map(([name, result]) => `| ${icon(result)} ${name} | ${result} |`)
              .join('\n');

            const allPassed = Object.values(jobs).every(r => r === 'success' || r === 'skipped');
            const status = allPassed ? '✅ All checks passed — ready to merge' : '❌ Some checks failed — review required';

            const body = `## CI/CD PR Checks\n\n${status}\n\n| Check | Status |\n|---|---|\n${rows}\n\n> Triggered by @${{ github.actor }} on \`${{ github.head_ref }}\``;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  # ── Notify on failure ─────────────────────────────────────────────────────────
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [test, dependency-scan, container-scan]
    if: failure()

    steps:
      - name: Send Slack notification on failure
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "❌ PR Checks FAILED",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*❌ PR Checks Failed*\n*Repo:* ${{ github.repository }}\n*PR:* <${{ github.event.pull_request.html_url }}|#${{ github.event.pull_request.number }} — ${{ github.event.pull_request.title }}>\n*Author:* ${{ github.actor }}\n*Branch:* `${{ github.head_ref }}`"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
        continue-on-error: true   # Don't fail if Slack webhook not configured
